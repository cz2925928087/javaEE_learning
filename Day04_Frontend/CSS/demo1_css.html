<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS测试</title>
    <!-- 
        CSS要写到style标签中，
        style标签可以放在页面任意位置,但一般放在在head标签中
        CSS 使⽤ /* */ 作为注释. (使⽤ ctrl + / 快速切换) .
    -->
    <!-- 内部样式 -->
    <style>
        p {
            /* 设置颜色 */
            color: rgb(72, 0, 255); 
            /* 设置字体大小 */
            font-size: 20px;   
        }
    </style>   
    <link rel="stylesheet" href="./demo_css.css">

</head>
<body>
    <!-- 行类样式 -->
    <p style="color: red;">helloWorld</p>
</body>
</html>
