<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注释示例</title>
</head>
<body>
    <!-- 这是一个单行注释 -->
<p>这是一个段落。</p>
 <!--
    这是一个多行注释。
    它可以跨越多行。
-->
<p>这是另一个段落。</p>

<p>我将成为 <!--暂时注释掉--> 一名开发者。</p>

<!-- <h1>这是被注释掉的标题</h1> -->
<p>这是正常显示的段落。</p>
    
</body>
</html>
