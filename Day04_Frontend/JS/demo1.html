<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript示例子</title>
</head>
<body>
    <!-- 行类样式 -->
    <input type="button" value="点击我" onclick="alert('我是神')">
    <!-- 内部样式 定义在标签内-->
    <script>
        alert("Hello, World!");
    </script>
    <!-- 外部样式 定义在外部文件中-->
    <script src="JS.js"></script>

    <!-- 打印日志 -->
    <script>
        console.log("打印日志");
    </script>
</body>
</html>
